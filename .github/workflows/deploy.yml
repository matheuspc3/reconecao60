name: CI/CD reconecao60

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: Validate Python project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m compileall .

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" << 'EOF'
            set -e

            cd /root/reconecao60

            git fetch origin main
            git reset --hard origin/main

            /root/reconecao60/venv/bin/python -m pip install --upgrade pip
            /root/reconecao60/venv/bin/pip install -r requirements.txt

            systemctl restart reconecao60
            systemctl is-active --quiet reconecao60
            systemctl status reconecao60 --no-pager -l
          EOF